<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condo Games Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1400px;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 15px;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.3);
            font-weight: 800;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .game-selection {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 50px;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-selection.hidden {
            display: none;
        }

        .game-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
            border: 4px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 25px 60px rgba(102, 126, 234, 0.4);
            border-color: #667eea;
        }

        .game-icon {
            font-size: 5em;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .game-card h2 {
            font-size: 2em;
            color: #333;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .game-card p {
            color: #666;
            font-size: 1em;
            line-height: 1.6;
        }

        .servers-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .servers-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-button {
            text-align: center;
            margin-bottom: 40px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 2px solid white;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.05em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.08);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .servers-title {
            color: white;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 50px;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.3);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 35px;
            margin-bottom: 40px;
        }

        .server-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
            transition: all 0.4s ease;
            border: 3px solid transparent;
            animation: slideInCard 0.5s ease forwards;
        }

        @keyframes slideInCard {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .server-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 60px rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }

        .server-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .server-name {
            font-size: 1.8em;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .server-status {
            font-size: 1em;
            opacity: 0.95;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .server-players {
            padding: 35px;
        }

        .player-count-display {
            text-align: center;
            font-size: 2.5em;
            color: #667eea;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .online-indicators {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            min-height: 40px;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ECDC4;
            animation: pulse 2s infinite;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.6);
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        .server-button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .join-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .join-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        .join-button:active {
            transform: translateY(-1px);
        }

        .full-button {
            background: linear-gradient(135deg, #ddd 0%, #ccc 100%);
            color: #999;
            cursor: not-allowed;
            font-style: italic;
        }

        .full-button:hover {
            transform: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .refresh-button {
            display: block;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 2px solid white;
            padding: 15px 50px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .refresh-button:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(1.08) rotate(10deg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.2em;
            }

            .servers-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .game-card {
                width: 100%;
            }

            .player-count-display {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎮 CONDO GAMES HUB</h1>
            <p id="headerSubtitle">Pilih Game untuk Dimainkan</p>
        </div>

        <!-- Game Selection Screen -->
        <div id="gameSelection" class="game-selection">
            <div class="game-card" onclick="selectGame('condogame')">
                <div class="game-icon">🏠</div>
                <h2>Condo Game</h2>
                <p>Bermain di kondominial yang mewah dan nikmati petualangan seru dengan teman-temanmu</p>
            </div>
        </div>

        <!-- Servers Screen -->
        <div id="serversScreen" class="servers-container">
            <div class="back-button">
                <button class="back-btn" onclick="goBack()">← KEMBALI</button>
            </div>
            <div class="servers-title" id="gameTitle">⚔️ SWORD GAME - PILIH SERVER</div>
            <div class="servers-grid" id="serversGrid"></div>
            <div style="text-align: center;">
                <button class="refresh-button" onclick="generateServers()">🔄 REFRESH SERVER</button>
            </div>
        </div>
    </div>

    <script>
        const MAX_PLAYERS = 50;
        const ROBLOX_JOIN_LINK = "https://www.roblox.et/games/15884350761/UPDATE-Bloody-Ragdoll-Engine-Remastered?privateServerLinkCode=01398199490362022720669062623329";

        let servers = [];
        let currentGame = '';

        function selectGame(game) {
            currentGame = game;
            document.getElementById('gameSelection').classList.add('hidden');
            document.getElementById('serversScreen').classList.add('active');
            document.getElementById('headerSubtitle').textContent = 'Sword Game';
            generateServers();
        }

        function goBack() {
            document.getElementById('gameSelection').classList.remove('hidden');
            document.getElementById('serversScreen').classList.remove('active');
            document.getElementById('headerSubtitle').textContent = 'Pilih Game untuk Dimainkan';
            servers = [];
        }

        function generateServers() {
            servers = [];
            
            // Server 1
            const server1PlayerCount = Math.floor(Math.random() * (MAX_PLAYERS + 1));
            servers.push({
                name: 'Server 1',
                playerCount: server1PlayerCount,
                maxPlayers: MAX_PLAYERS,
                isFull: server1PlayerCount >= MAX_PLAYERS
            });

            // Server 2
            const server2PlayerCount = Math.floor(Math.random() * (MAX_PLAYERS + 1));
            servers.push({
                name: 'Server 2',
                playerCount: server2PlayerCount,
                maxPlayers: MAX_PLAYERS,
                isFull: server2PlayerCount >= MAX_PLAYERS
            });

            renderServers();
        }

        function renderServers() {
            const serversGrid = document.getElementById('serversGrid');
            serversGrid.innerHTML = '';

            servers.forEach((server, index) => {
                const serverCard = document.createElement('div');
                serverCard.className = 'server-card';
                serverCard.style.animationDelay = `${index * 0.1}s`;

                const statusText = server.isFull 
                    ? `${server.playerCount}/${server.maxPlayers} (PENUH)` 
                    : `${server.playerCount}/${server.maxPlayers} TERSEDIA`;

                // Generate online indicators
                let onlineIndicatorsHTML = '';
                for (let i = 0; i < server.playerCount; i++) {
                    onlineIndicatorsHTML += '<div class="online-dot"></div>';
                }

                const buttonHTML = server.isFull
                    ? '<button class="server-button full-button">⛔ SERVER PENUH</button>'
                    : `<a href="${ROBLOX_JOIN_LINK}" target="_blank" class="server-button join-button">✨ JOIN SERVER SEKARANG</a>`;

                serverCard.innerHTML = `
                    <div class="server-header">
                        <div class="server-name">${server.name}</div>
                        <div class="server-status">${statusText}</div>
                    </div>
                    <div class="server-players">
                        <div class="player-count-display">${server.playerCount}/${server.maxPlayers}</div>
                        <div class="online-indicators">
                            ${onlineIndicatorsHTML || '<p style="color: #999; margin: 0;">Belum ada pemain</p>'}
                        </div>
                        ${buttonHTML}
                    </div>
                `;

                serversGrid.appendChild(serverCard);
            });
        }

        // Initial setup
        window.addEventListener('load', () => {
            console.log('🎮 Condo Games Hub Ready!');
        });
    </script>
</body>
</html>
